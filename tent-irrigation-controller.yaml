substitutions:
  # --- Failsafe knobs (added 2026-06-19) ---
  valve_max_on_time: 40min            # On-device per-valve auto-close ceiling. Set ABOVE the
                                      # longest legitimate open (~30 min) so it only trips on a
                                      # genuine stuck-open / HA-hung event. Runs on the ESP, so it
                                      # protects even when HA is unreachable.

esphome:
  name: tent-irrigation-controller
  friendly_name: Tent Irrigation Controller
  # Publish authoritative CLOSED on every boot. The GPIO outputs come up LOW
  # (valves physically shut), but the optimistic template valves can publish a
  # stale "open" after a power-blip reboot (2026-07-06 incident: all five came
  # back "open" in HA while physically closed, tripping the HA watchdog).
  on_boot:
    priority: -100
    then:
      - valve.close: flush_drain_valve_irrigation_tent
      - valve.close: flush_valve_irrigation_tent
      - valve.close: flush_fill_valve_irrigation_tent
      - valve.close: feed_fill_irrigation_valve_tent
      - valve.close: feed_valve_irrigation_tent

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret tent_irrigation_api_key
  # Second-layer failsafe: if no API client (HA) is connected for this long, reboot.
  # All GPIO outputs default OFF on boot, so every valve closes. Primary protection is
  # the per-valve watchdog below, which runs on-device regardless of HA.
  reboot_timeout: 10min

ota:
  - platform: esphome
    password: !secret tent_irrigation_ota_password

wifi:
  # Grow-area AP (GT784WN bridge @ 192.168.2.250, 2026-07-10) preferred;
  # main router kept as fallback - ESPHome falls back automatically if the AP is down.
  networks:
    - ssid: !secret wifi_ssid_grow
      password: !secret wifi_password_grow
      priority: 10
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      priority: 0
  ap:
    ssid: "Tent-Irrigation-Controller"
    password: !secret tent_irrigation_ap_password

captive_portal:

binary_sensor:
   - platform: gpio
     pin:
       number: GPIO21
       mode: INPUT_PULLUP
       inverted: true
     name: "Feed Empty"
     id: feed_empty_irrigation_tent
     device_class: moisture
     filters:
       - delayed_on: 2s
       - delayed_off: 30s
     on_release:
       - pulse_counter.set_total_pulses:
           id: flow_rate_irrigation_tent
           value: 0

   - platform: gpio
     pin:
       number: GPIO19
       mode: INPUT_PULLUP
       inverted: true
     name: "Feed Half"
     id: feed_half_irrigation_tent
     device_class: moisture
     filters:
       - delayed_on: 2s
       - delayed_off: 30s

   - platform: gpio
     pin:
       number: GPIO18
       mode: INPUT_PULLUP
       inverted: true
     name: "Feed Three Quarter"
     id: feed_three_quarter_irrigation_tent
     device_class: moisture
     filters:
       - delayed_on: 2s
       - delayed_off: 30s

   - platform: gpio
     pin:
       number: GPIO17
       mode: INPUT_PULLUP
       inverted: true
     name: "Feed Full"
     id: feed_full_irrigation_tent
     device_class: moisture
     filters:
       - delayed_on: 2s
       - delayed_off: 30s
     # On-device overfill interlock: feed reservoir full -> close feed fill valve,
     # independent of HA. Backstops automation.irrigation_block_feed_fill_when_reservoir_full.
     on_press:
       - valve.close: feed_fill_irrigation_valve_tent

   - platform: gpio
     pin:
       number: GPIO16
       mode: INPUT_PULLUP
       inverted: true
     name: "Flush Empty"
     id: flush_empty_irrigation_tent
     device_class: moisture
     filters:
       - delayed_on: 2s
       - delayed_off: 30s

   - platform: gpio
     pin:
       number: GPIO13
       mode: INPUT_PULLUP
       inverted: true
     name: "Flush Half"
     id: flush_half_irrigation_tent
     device_class: moisture
     filters:
       - delayed_on: 2s
       - delayed_off: 30s

   - platform: gpio
     pin:
       number: GPIO14
       mode: INPUT_PULLUP
       inverted: true
     name: "Flush Full"
     id: flush_full_irrigation_tent
     device_class: moisture
     filters:
       - delayed_on: 2s
       - delayed_off: 30s
     # On-device overfill interlock: flush reservoir full -> close flush fill valve,
     # independent of HA. Backstops automation.irrigation_block_flush_fill_when_reservoir_full.
     on_press:
       - valve.close: flush_fill_valve_irrigation_tent

one_wire:
   - platform: gpio
     pin: GPIO4

sensor:
   # WiFi diagnostics (grow-area AP migration 2026-07-10): RSSI + which SSID
   # the ESP associated to, to verify Brentons vs main-router fallback.
   - platform: wifi_signal
     name: "WiFi Signal"
     update_interval: 60s

   # Reboot forensics (added 2026-07-06 after the power-blip incident): lets HA
   # distinguish "ESP rebooted" from "network blip" after an outage.
   - platform: uptime
     name: "Uptime"
     id: uptime_irrigation_tent
     update_interval: 60s

   # DS18B20 update_interval lowered 60s (platform default) -> 10s (2026-07-01)
   # so reservoir temp reacts quickly during fills/flushes.
   - platform: dallas_temp
     address: 0x5000000047758c28
     name: "Feed Temperature"
     id: feed_temperauture_irrigation_tent
     update_interval: 10s

   - platform: dallas_temp
     address: 0x6f000000455cab28
     name: "Flush Temperature"
     id: flush_temperature_irrigation_tent
     update_interval: 10s

   - platform: adc
     pin: GPIO34
     name: "Pressure Pre-Regulator"
     id: pressure_pre_regulator_irrigation_tent
     attenuation: 12db
     update_interval: 2s
     # Filter rework 2026-07-17 (pre-reg transducer post-mortem): average the RAW
     # voltage first, then convert — identical math, but the dead-sensor floor
     # check sees a settled voltage. Below 0.20 V the transducer is electrically
     # absent (disconnected / failed / unpowered — a healthy one outputs 0.333 V
     # at 0 psi), so publish NAN and HA shows unknown instead of a fake 0.0 psi.
     # send_every 5 -> 1: a feed is only ~60 s of pumping and 10 s publishes
     # averaged the peaks away; 2 s publishes capture them (drop back to 5 after
     # commissioning if recorder volume becomes a bother).
     filters:
       - sliding_window_moving_average:
           window_size: 5
           send_every: 1
       - lambda: |-
           if (x < 0.20f) return NAN;
           float psi = (x - 0.333f) / (3.0f - 0.333f) * 30.0f;
           return psi < 0.0f ? 0.0f : psi;
     unit_of_measurement: "psi"
     device_class: pressure
     state_class: measurement
     accuracy_decimals: 1

   - platform: adc
     pin: GPIO35
     name: "Pressure Post-Regulator"
     id: pressure_post_regulator_irrigation_tent
     attenuation: 12db
     update_interval: 2s
     # Same 2026-07-17 filter rework as Pressure Pre-Regulator above
     # (dead-transducer NAN floor + 2 s publishes).
     filters:
       - sliding_window_moving_average:
           window_size: 5
           send_every: 1
       - lambda: |-
           if (x < 0.20f) return NAN;
           float psi = (x - 0.333f) / (3.0f - 0.333f) * 30.0f;
           return psi < 0.0f ? 0.0f : psi;
     unit_of_measurement: "psi"
     device_class: pressure
     state_class: measurement
     accuracy_decimals: 1

   - platform: pulse_counter
     pin:
       number: GPIO32
       mode: INPUT_PULLUP
     name: "Flow Rate"
     id: flow_rate_irrigation_tent
     update_interval: 5s
     # Calibration: 62.72 pulses/L (bucket test 2026-05-10: 127 pulses for 2.025 L)
     filters:
       - lambda: |-
           return x / 62.72f;
     unit_of_measurement: "L/min"
     state_class: measurement
     accuracy_decimals: 2
     total:
       name: "Flow Total"
       id: flow_total_irrigation_tent
       unit_of_measurement: "L"
       state_class: total_increasing
       filters:
         - lambda: return x / 62.72f;


output:
   - platform: gpio
     pin:
       number: GPIO22
       mode: OUTPUT
     id: flush_drain_valve_irrigation_tent_output

   - platform: gpio
     pin:
       number: GPIO23
       mode: OUTPUT
     id: flush_valve_irrigation_tent_output

   - platform: gpio
     pin:
       number: GPIO25
       mode: OUTPUT
     id: flush_fill_valve_irrigation_tent_output

   - platform: gpio
     pin:
       number: GPIO26
       mode: OUTPUT
     id: feed_fill_valve_irrigation_tent_output

   - platform: gpio
     pin:
       number: GPIO27
       mode: OUTPUT
     id: feed_valve_irrigation_tent_output

   # ---- Air-pinch servo PWM (added 2026-06-20) ----
   # 50 Hz signal pins for the two DS3225 servos that drive the reservoir air-line pinch
   # valves. Servo POWER comes from a dedicated XL4016 buck @ 6.0V (NOT the ESP board);
   # only these signal wires land on the ESP32. GPIO5 is a strapping pin and emits a brief
   # PWM blip at boot — harmless, the over-center cam holds the pinch position through it.
   - platform: ledc
     pin: GPIO33
     frequency: 50 Hz
     id: feed_air_servo_pwm
   - platform: ledc
     pin: GPIO5
     frequency: 50 Hz
     id: flush_air_servo_pwm

# On-device per-valve max-on watchdogs. open_action starts the matching script (mode: restart,
# so re-opening restarts the timer); close_action cancels it. If a valve stays open past
# ${valve_max_on_time}, the ESP force-closes it — no HA involvement required.
script:
  - id: watchdog_flush_drain_valve
    mode: restart
    then:
      - delay: ${valve_max_on_time}
      - logger.log: "WATCHDOG: Flush Drain Valve exceeded max-on time — force closing"
      - valve.close: flush_drain_valve_irrigation_tent

  - id: watchdog_flush_valve
    mode: restart
    then:
      - delay: ${valve_max_on_time}
      - logger.log: "WATCHDOG: Flush Valve exceeded max-on time — force closing"
      - valve.close: flush_valve_irrigation_tent

  - id: watchdog_flush_fill_valve
    mode: restart
    then:
      - delay: ${valve_max_on_time}
      - logger.log: "WATCHDOG: Flush Fill Valve exceeded max-on time — force closing"
      - valve.close: flush_fill_valve_irrigation_tent

  - id: watchdog_feed_fill_valve
    mode: restart
    then:
      - delay: ${valve_max_on_time}
      - logger.log: "WATCHDOG: Feed Fill Valve exceeded max-on time — force closing"
      - valve.close: feed_fill_irrigation_valve_tent

  - id: watchdog_feed_valve
    mode: restart
    then:
      - delay: ${valve_max_on_time}
      - logger.log: "WATCHDOG: Feed Valve exceeded max-on time — force closing"
      - valve.close: feed_valve_irrigation_tent

valve:
   - platform: template
     name: "Flush Drain Valve"
     id: flush_drain_valve_irrigation_tent
     open_action:
       - output.turn_on: flush_drain_valve_irrigation_tent_output
       - script.execute: watchdog_flush_drain_valve
     close_action:
       - output.turn_off: flush_drain_valve_irrigation_tent_output
       - script.stop: watchdog_flush_drain_valve
     optimistic: true

   - platform: template
     name: "Flush Valve"
     id: flush_valve_irrigation_tent
     open_action:
       - output.turn_on: flush_valve_irrigation_tent_output
       - script.execute: watchdog_flush_valve
     close_action:
       - output.turn_off: flush_valve_irrigation_tent_output
       - script.stop: watchdog_flush_valve
     optimistic: true

   - platform: template
     name: "Flush Fill Valve"
     id: flush_fill_valve_irrigation_tent
     open_action:
       - output.turn_on: flush_fill_valve_irrigation_tent_output
       - script.execute: watchdog_flush_fill_valve
     close_action:
       - output.turn_off: flush_fill_valve_irrigation_tent_output
       - script.stop: watchdog_flush_fill_valve
     optimistic: true

   - platform: template
     name: "Feed Fill Valve"
     id: feed_fill_irrigation_valve_tent
     open_action:
       - output.turn_on: feed_fill_valve_irrigation_tent_output
       - script.execute: watchdog_feed_fill_valve
     close_action:
       - output.turn_off: feed_fill_valve_irrigation_tent_output
       - script.stop: watchdog_feed_fill_valve
     optimistic: true

   - platform: template
     name: "Feed Valve"
     id: feed_valve_irrigation_tent
     open_action:
       - output.turn_on: feed_valve_irrigation_tent_output
       - script.execute: watchdog_feed_valve
     close_action:
       - output.turn_off: feed_valve_irrigation_tent_output
       - script.stop: watchdog_feed_valve
     optimistic: true

# ---- Reservoir air-line pinch servos (added 2026-06-20) ----
# Two DS3225 servos drive over-center cam pinch valves on the 1/2" air lines feeding the
# feed and flush reservoirs. auto_detach_time makes the servo go limp ~1.5s after reaching
# position so it holds ZERO current/torque (the cam's mechanical over-center stop holds the
# pinch). No max-on watchdog like the fluid valves — air pinch has no flood risk.
servo:
   # min_level/max_level 2.5%/12.5% = 500-2500us: DS3225 needs the full pulse range to reach
   # rated 180deg travel (ESPHome default 600-2400us clips it short). transition_length 0s:
   # the stepped 0.7s ramp made the fast DS3225 chase each micro-step -> audible/tactile
   # stutter; instant target = one clean smooth swing. Both bench-verified on test-esp32
   # 2026-07-12. Re-tune min/max_level only if -100%/100% over-travels the real cam stops.
   - id: feed_air_servo
     output: feed_air_servo_pwm
     auto_detach_time: 1.5s
     transition_length: 0s
     min_level: 2.5%
     max_level: 12.5%
   - id: flush_air_servo
     output: flush_air_servo_pwm
     auto_detach_time: 1.5s
     transition_length: 0s
     min_level: 2.5%
     max_level: 12.5%

# Air-line control. ON  = air flowing (hose OPEN, servo at "open" cam stop).
#                   OFF = air blocked (hose PINCHED, servo at "closed" cam stop).
# RESTORE_DEFAULT_ON => fail-to-air-on at boot so the pump is never dead-headed.
# CALIBRATION TODO: the -100% / 100% levels below are placeholders — set them to the real
# open / pinched cam end positions on the bench before relying on these (see plan verify step).
switch:
   - platform: template
     name: "Feed Air"
     id: feed_air_irrigation_tent
     icon: mdi:weather-windy
     optimistic: true
     restore_mode: RESTORE_DEFAULT_ON
     turn_on_action:
       - servo.write:
           id: feed_air_servo
           level: -100%
     turn_off_action:
       - servo.write:
           id: feed_air_servo
           level: 100%
   - platform: template
     name: "Flush Air"
     id: flush_air_irrigation_tent
     icon: mdi:weather-windy
     optimistic: true
     restore_mode: RESTORE_DEFAULT_ON
     turn_on_action:
       - servo.write:
           id: flush_air_servo
           level: -100%
     turn_off_action:
       - servo.write:
           id: flush_air_servo
           level: 100%

################ WiFi info (grow-area AP migration 2026-07-10) ################
text_sensor:
  - platform: wifi_info
    ssid:
      name: "WiFi SSID"
