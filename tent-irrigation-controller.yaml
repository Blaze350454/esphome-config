esphome:
  name: tent-irrigation-controller
  friendly_name: Tent Irrigation Controller

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret tent_irrigation_api_key

ota:
  - platform: esphome
    password: !secret tent_irrigation_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Tent-Irrigation-Controller"
    password: !secret tent_irrigation_ap_password

captive_portal:

binary_sensor:
   - platform: gpio
     pin:
       number: GPIO21
       mode: INPUT_PULLUP
       inverted: true
     name: "Feed Empty"
     id: feed_empty_irrigation_tent
     device_class: moisture
     filters:
       - delayed_on: 2s
       - delayed_off: 2s
     on_release:
       - pulse_counter.set_total_pulses:
           id: flow_rate_irrigation_tent
           value: 0

   - platform: gpio
     pin:
       number: GPIO19
       mode: INPUT_PULLUP
       inverted: true
     name: "Feed Half"
     id: feed_half_irrigation_tent
     device_class: moisture
     filters:
       - delayed_on: 2s
       - delayed_off: 2s

   - platform: gpio
     pin:
       number: GPIO18
       mode: INPUT_PULLUP
       inverted: true
     name: "Feed Three Quarter"
     id: feed_three_quarter_irrigation_tent
     device_class: moisture
     filters:
       - delayed_on: 2s
       - delayed_off: 2s

   - platform: gpio
     pin:
       number: GPIO17
       mode: INPUT_PULLUP
       inverted: true
     name: "Feed Full"
     id: feed_full_irrigation_tent
     device_class: moisture
     filters:
       - delayed_on: 2s
       - delayed_off: 2s

   - platform: gpio
     pin:
       number: GPIO16
       mode: INPUT_PULLUP
       inverted: true
     name: "Flush Empty"
     id: flush_empty_irrigation_tent
     device_class: moisture
     filters:
       - delayed_on: 2s
       - delayed_off: 2s

   - platform: gpio
     pin:
       number: GPIO13
       mode: INPUT_PULLUP
       inverted: true
     name: "Flush Half"
     id: flush_half_irrigation_tent
     device_class: moisture
     filters:
       - delayed_on: 2s
       - delayed_off: 2s

   - platform: gpio
     pin:
       number: GPIO14
       mode: INPUT_PULLUP
       inverted: true
     name: "Flush Full"
     id: flush_full_irrigation_tent
     device_class: moisture
     filters:
       - delayed_on: 2s
       - delayed_off: 2s

one_wire:
   - platform: gpio
     pin: GPIO4

sensor:
   - platform: dallas_temp
     address: 0x5000000047758c28
     name: "Feed Temperature"
     id: feed_temperauture_irrigation_tent

   - platform: dallas_temp
     address: 0x6f000000455cab28
     name: "Flush Temperature"
     id: flush_temperature_irrigation_tent

   #- platform: adc
     #pin: GPIO34
     #name: "Pressure Pre-Regulator"
     #id: pressure_pre_regulator_irrigation_tent
     #attenuation: 12db
     #update_interval: 2s
     #filters:
       #- lambda: |-
           #float psi = (x - 0.333f) / (3.0f - 0.333f) * 100.0f;
           #return psi < 0.0f ? 0.0f : psi;
       #- sliding_window_moving_average:
           #window_size: 5
           #send_every: 5
     #unit_of_measurement: "psi"
    # device_class: pressure
    # state_class: measurement
    # accuracy_decimals: 1

   - platform: adc
     pin: GPIO35
     name: "Pressure Post-Regulator"
     id: pressure_post_regulator_irrigation_tent
     attenuation: 12db
     update_interval: 2s
     filters:
       - lambda: |-
           float psi = (x - 0.333f) / (3.0f - 0.333f) * 100.0f;
           return psi < 0.0f ? 0.0f : psi;
       - sliding_window_moving_average:
           window_size: 5
           send_every: 5
     unit_of_measurement: "psi"
     device_class: pressure
     state_class: measurement
     accuracy_decimals: 1

   - platform: pulse_counter
     pin:
       number: GPIO32
       mode: INPUT_PULLUP
     name: "Flow Rate"
     id: flow_rate_irrigation_tent
     update_interval: 5s
     filters:
       - lambda: |-
           return x / 396.0f;
     unit_of_measurement: "L/min"
     state_class: measurement
     accuracy_decimals: 2
     total:
       name: "Flow Total"
       id: flow_total_irrigation_tent
       unit_of_measurement: "L"
       state_class: total_increasing
       filters:
         - lambda: return x / 396.0f;

   - platform: adc
     pin: GPIO34
     name: "Pressure Pre-Reg RAW Voltage"
     attenuation: 12db
     update_interval: 2s
     unit_of_measurement: "V"
     accuracy_decimals: 3     


output:
   - platform: gpio
     pin:
       number: GPIO22
       mode: OUTPUT
     id: flush_drain_valve_irrigation_tent_output

   - platform: gpio
     pin:
       number: GPIO23
       mode: OUTPUT
     id: flush_valve_irrigation_tent_output

   - platform: gpio
     pin:
       number: GPIO25
       mode: OUTPUT
     id: flush_fill_valve_irrigation_tent_output

   - platform: gpio
     pin:
       number: GPIO26
       mode: OUTPUT
     id: feed_fill_valve_irrigation_tent_output

   - platform: gpio
     pin:
       number: GPIO27
       mode: OUTPUT
     id: feed_valve_irrigation_tent_output

valve:
   - platform: template
     name: "Flush Drain Valve"
     id: flush_drain_valve_irrigation_tent
     open_action:
       - output.turn_on: flush_drain_valve_irrigation_tent_output
     close_action:
       - output.turn_off: flush_drain_valve_irrigation_tent_output
     optimistic: true

   - platform: template
     name: "Flush Valve"
     id: flush_valve_irrigation_tent
     open_action:
       - output.turn_on: flush_valve_irrigation_tent_output
     close_action:
       - output.turn_off: flush_valve_irrigation_tent_output
     optimistic: true

   - platform: template
     name: "Flush Fill Valve"
     id: flush_fill_valve_irrigation_tent
     open_action:
       - output.turn_on: flush_fill_valve_irrigation_tent_output
     close_action:
       - output.turn_off: flush_fill_valve_irrigation_tent_output
     optimistic: true

   - platform: template
     name: "Feed Fill Valve"
     id: feed_fill_irrigation_valve_tent
     open_action:
       - output.turn_on: feed_fill_valve_irrigation_tent_output
     close_action:
       - output.turn_off: feed_fill_valve_irrigation_tent_output
     optimistic: true

   - platform: template
     name: "Feed Valve"
     id: feed_valve_irrigation_tent
     open_action:
       - output.turn_on: feed_valve_irrigation_tent_output
     close_action:
       - output.turn_off: feed_valve_irrigation_tent_output
     optimistic: true

