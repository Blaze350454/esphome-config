esphome:
  name: "grow-tower"
  friendly_name: Grow Tower
  on_boot:
    priority: -100
    then:
      - script.execute: led_restore_aesthetic

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret grow_tower_api_key

ota:
  - platform: esphome
    password: !secret grow_tower_ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Grow-Tower Fallback Hotspot"
    password: !secret grow_tower_ap_password

captive_portal:

################ Diagnostics ################
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    mac_address:
      name: "MAC Address"

  - platform: version
    name: "ESPHome Version"

binary_sensor:

  - platform: gpio
    pin:
      number: GPIO14
      mode: INPUT_PULLUP
      inverted: true
    name: "Water Level Low"
    id: grow_tower_water_level_low
    device_class: moisture
    filters:
      - delayed_on: 1s
      - delayed_off: 1s
    on_release:
      - script.execute: led_low_alert
    on_press:
      - script.stop: led_low_alert
      - if:
          condition:
            binary_sensor.is_off: grow_tower_water_level_medium
          then:
            - script.execute: led_medium_alert
          else:
            - script.execute: led_restore_aesthetic

  - platform: gpio
    pin:
      number: GPIO32
      mode: INPUT_PULLUP
      inverted: true
    name: "Water Level High"
    id: grow_tower_water_level_high
    device_class: moisture
    filters:
      - delayed_on: 1s
      - delayed_off: 1s
    on_press:
      - script.execute: led_high_full_flash

  - platform: gpio
    pin:
      number: GPIO33
      mode: INPUT_PULLUP
      inverted: true
    name: "Water Level Medium"
    id: grow_tower_water_level_medium
    device_class: moisture
    filters:
      - delayed_on: 1s
      - delayed_off: 1s
    on_release:
      - script.execute: led_medium_alert
    on_press:
      - script.stop: led_medium_alert
      - if:
          condition:
            binary_sensor.is_on: grow_tower_water_level_low
          then:
            - script.execute: led_restore_aesthetic

################ LED alert tuning (dashboard-adjustable) ################
number:
  - platform: template
    name: "Medium Alert On Seconds"
    id: medium_alert_on_s
    icon: mdi:timer-play-outline
    min_value: 1
    max_value: 30
    step: 1
    initial_value: 10
    restore_value: true
    optimistic: true
    unit_of_measurement: s

  - platform: template
    name: "Medium Alert Off Seconds"
    id: medium_alert_off_s
    icon: mdi:timer-outline
    min_value: 10
    max_value: 900
    step: 5
    initial_value: 230
    restore_value: true
    optimistic: true
    unit_of_measurement: s

  - platform: template
    name: "Low Alert On Seconds"
    id: low_alert_on_s
    icon: mdi:timer-play-outline
    min_value: 1
    max_value: 30
    step: 1
    initial_value: 10
    restore_value: true
    optimistic: true
    unit_of_measurement: s

  - platform: template
    name: "Low Alert Off Seconds"
    id: low_alert_off_s
    icon: mdi:timer-outline
    min_value: 10
    max_value: 600
    step: 5
    initial_value: 110
    restore_value: true
    optimistic: true
    unit_of_measurement: s

select:
  - platform: template
    name: "Medium Alert Color"
    id: medium_alert_color
    icon: mdi:palette
    optimistic: true
    restore_value: true
    initial_option: "Yellow"
    options:
      - "Yellow"
      - "Orange"
      - "Green"
      - "Blue"

# Named color palette — one text line per color, "R,G,B" 0-255. Edit these to
# retune what each named color actually looks like on this LED; every script
# below (aesthetic idle, notifications) reads its color from here, so a color
# is defined once and reused everywhere.
text:
  - platform: template
    name: "Color Yellow"
    id: color_yellow
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "255,140,0"
    min_length: 5
    max_length: 15

  - platform: template
    name: "Color Orange"
    id: color_orange
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "255,77,0"
    min_length: 5
    max_length: 15

  - platform: template
    name: "Color Green"
    id: color_green
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "0,255,0"
    min_length: 5
    max_length: 15

  - platform: template
    name: "Color Blue"
    id: color_blue
    mode: text
    optimistic: true
    restore_value: true
    initial_value: "0,0,255"
    min_length: 5
    max_length: 15

################ Testing controls ################
switch:
  - platform: template
    name: "Aesthetic Enabled"
    id: aesthetic_enabled
    icon: mdi:led-strip-variant
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    # Direct/unconditional actions (no re-checking this switch's own state —
    # that's an unreliable self-read from inside its own state-change trigger,
    # which caused turning it on to sometimes show as off and vice versa).
    turn_on_action:
      - script.execute:
          id: led_set_color_from_text
          color_text: !lambda 'return id(color_green).state;'
      - light.turn_on:
          id: grow_tower_led
          red: !lambda 'return id(current_led_r);'
          green: !lambda 'return id(current_led_g);'
          blue: !lambda 'return id(current_led_b);'
          brightness: 1.0
          effect: "Aesthetic Breathe"
    turn_off_action:
      - light.turn_off: grow_tower_led

  - platform: gpio
    name: "Water Pump"
    pin:
      number: GPIO23
      mode: OUTPUT
      inverted: false
    id: relay_switch
    # Safety: Ensure relay starts in OFF state when powered on
    restore_mode: ALWAYS_OFF
    # Optional: Add interlock if using multiple relays
    # interlock: [relay_switch2, relay_switch3]

# One-tap preview buttons: force the LED to a named color right now (solid,
# no effect), regardless of the Aesthetic Enabled switch or sensor states.
# Useful for eyeballing/tuning the Color* text values against the real LED.
button:
  - platform: template
    name: "Preview Yellow"
    icon: mdi:palette
    on_press:
      - script.execute:
          id: led_set_color_from_text
          color_text: !lambda 'return id(color_yellow).state;'
      - light.turn_on:
          id: grow_tower_led
          effect: "None"
          red: !lambda 'return id(current_led_r);'
          green: !lambda 'return id(current_led_g);'
          blue: !lambda 'return id(current_led_b);'
          brightness: 1.0

  - platform: template
    name: "Preview Orange"
    icon: mdi:palette
    on_press:
      - script.execute:
          id: led_set_color_from_text
          color_text: !lambda 'return id(color_orange).state;'
      - light.turn_on:
          id: grow_tower_led
          effect: "None"
          red: !lambda 'return id(current_led_r);'
          green: !lambda 'return id(current_led_g);'
          blue: !lambda 'return id(current_led_b);'
          brightness: 1.0

  - platform: template
    name: "Preview Green"
    icon: mdi:palette
    on_press:
      - script.execute:
          id: led_set_color_from_text
          color_text: !lambda 'return id(color_green).state;'
      - light.turn_on:
          id: grow_tower_led
          effect: "None"
          red: !lambda 'return id(current_led_r);'
          green: !lambda 'return id(current_led_g);'
          blue: !lambda 'return id(current_led_b);'
          brightness: 1.0

  - platform: template
    name: "Preview Blue"
    icon: mdi:palette
    on_press:
      - script.execute:
          id: led_set_color_from_text
          color_text: !lambda 'return id(color_blue).state;'
      - light.turn_on:
          id: grow_tower_led
          effect: "None"
          red: !lambda 'return id(current_led_r);'
          green: !lambda 'return id(current_led_g);'
          blue: !lambda 'return id(current_led_b);'
          brightness: 1.0

# Scratch globals holding the last-parsed color, set by led_set_color_from_text.
globals:
  - id: current_led_r
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: current_led_g
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: current_led_b
    type: float
    restore_value: no
    initial_value: "0.0"

script:
  # Parses a "R,G,B" (0-255) string from one of the Color* text entities into
  # current_led_r/g/b (0.0-1.0), for the light.turn_on calls below to read.
  - id: led_set_color_from_text
    parameters:
      color_text: string
    then:
      - lambda: |-
          std::string s = color_text;
          size_t p1 = s.find(',');
          size_t p2 = s.find(',', p1 + 1);
          float r = atof(s.substr(0, p1).c_str()) / 255.0f;
          float g = atof(s.substr(p1 + 1, p2 - p1 - 1).c_str()) / 255.0f;
          float b = atof(s.substr(p2 + 1).c_str()) / 255.0f;
          id(current_led_r) = r;
          id(current_led_g) = g;
          id(current_led_b) = b;

  # Default idle look: "Color Green", very slow breathe — only while the
  # "Aesthetic Enabled" switch is on. When off, this just turns the LED off,
  # so it stays dark/quiet between manual test presses instead of fighting them.
  # (Called from other scripts/triggers that don't already know the switch
  # state — the switch's own turn_on/turn_off actions above don't call this.)
  - id: led_restore_aesthetic
    then:
      - if:
          condition:
            switch.is_on: aesthetic_enabled
          then:
            - script.execute:
                id: led_set_color_from_text
                color_text: !lambda 'return id(color_green).state;'
            - light.turn_on:
                id: grow_tower_led
                red: !lambda 'return id(current_led_r);'
                green: !lambda 'return id(current_led_g);'
                blue: !lambda 'return id(current_led_b);'
                brightness: 1.0
                effect: "Aesthetic Breathe"
          else:
            - light.turn_off: grow_tower_led

  # MEDIUM dry: colored slow-pulse, then idle, repeating while it stays dry
  # AND low is still wet (if LOW is also dry, led_low_alert owns the light —
  # this extra guard prevents a stray MEDIUM on_release re-trigger, e.g. from
  # sensor bounce, from fighting the red alert once LOW is already dry).
  # Timing is dashboard-adjustable; color comes from whichever named color the
  # "Medium Alert Color" select currently points at.
  - id: led_medium_alert
    mode: restart
    then:
      - while:
          condition:
            and:
              - binary_sensor.is_off: grow_tower_water_level_medium
              - binary_sensor.is_on: grow_tower_water_level_low
          then:
            - script.execute:
                id: led_set_color_from_text
                color_text: !lambda |-
                  std::string c = id(medium_alert_color).state;
                  if (c == "Orange") return id(color_orange).state;
                  if (c == "Green") return id(color_green).state;
                  if (c == "Blue") return id(color_blue).state;
                  return id(color_yellow).state;
            - light.turn_on:
                id: grow_tower_led
                red: !lambda 'return id(current_led_r);'
                green: !lambda 'return id(current_led_g);'
                blue: !lambda 'return id(current_led_b);'
                brightness: 1.0
                effect: "Slow Pulse"
            - delay: !lambda 'return (uint32_t)(id(medium_alert_on_s).state * 1000);'
            - script.execute: led_restore_aesthetic
            - delay: !lambda 'return (uint32_t)(id(medium_alert_off_s).state * 1000);'

  # LOW/empty dry: red ~1Hz flash, then idle, repeating while it stays dry.
  # Immediately supersedes the MEDIUM alert; resumes it (if still dry) once LOW clears.
  - id: led_low_alert
    mode: restart
    then:
      - script.stop: led_medium_alert
      - while:
          condition:
            binary_sensor.is_off: grow_tower_water_level_low
          then:
            - repeat:
                count: !lambda 'return (int) id(low_alert_on_s).state;'
                then:
                  - light.turn_on:
                      id: grow_tower_led
                      effect: "None"
                      red: 1.0
                      green: 0.0
                      blue: 0.0
                      brightness: 1.0
                  - delay: 500ms
                  - light.turn_off: grow_tower_led
                  - delay: 500ms
            - script.execute: led_restore_aesthetic
            - delay: !lambda 'return (uint32_t)(id(low_alert_off_s).state * 1000);'
      - if:
          condition:
            binary_sensor.is_off: grow_tower_water_level_medium
          then:
            - script.execute: led_medium_alert

  # HIGH just went wet (tank full): one-shot fast "Color Green" flash, ~10s, then idle.
  - id: led_high_full_flash
    mode: restart
    then:
      - script.stop: led_medium_alert
      - script.stop: led_low_alert
      - script.execute:
          id: led_set_color_from_text
          color_text: !lambda 'return id(color_green).state;'
      - repeat:
          count: 20
          then:
            - light.turn_on:
                id: grow_tower_led
                effect: "None"
                red: !lambda 'return id(current_led_r);'
                green: !lambda 'return id(current_led_g);'
                blue: !lambda 'return id(current_led_b);'
                brightness: 1.0
            - delay: 250ms
            - light.turn_off: grow_tower_led
            - delay: 250ms
      - script.execute: led_restore_aesthetic

light:
  - platform: rgb
    id: grow_tower_led
    name: "LED"
    red: pwm_red
    green: pwm_green
    blue: pwm_blue
    gamma_correct: 2.2  # Adjust for brightness balance
    effects:
      - lambda:
          name: "Pulse 30%-100%"
          update_interval: 300ms  # Slower update to reduce ESP32 workload
          lambda: |-
            static float brightness = 0.15; // Start at 30%
            static bool increasing = true;

            if (increasing) {
              brightness += 0.0412; // Increase over ~5 seconds
              if (brightness >= 1.0) {
                brightness = 1.0;
                increasing = false;
              }
            } else {
              brightness -= 0.0412; // Decrease over ~5 seconds
              if (brightness <= 0.15) {
                brightness = 0.15;
                increasing = true;
              }
            }

            auto call = id(grow_tower_led).turn_on();
            call.set_brightness(brightness);
            call.perform();

      - pulse:
          name: "Slow Pulse"
          transition_length: 3s  # Slow transition
          update_interval: 3s    # Smooth cycle

      - pulse:
          name: "Fast Pulse"
          transition_length: 0.5s  # Faster transition
          update_interval: 0.5s    # Rapid cycle

      - pulse:
          name: "Aesthetic Breathe"
          transition_length: 5s  # Very slow fade
          update_interval: 5s

output:
  - platform: ledc
    id: pwm_red
    pin: GPIO25
    frequency: 1000Hz
  - platform: ledc
    id: pwm_green
    pin: GPIO26
    frequency: 1000Hz
  - platform: ledc
    id: pwm_blue
    pin: GPIO27
    frequency: 1000Hz
