# Bench-test board (spare ESP32 devkit, CP2102N) for prototyping against the real
# tent-irrigation-controller — currently: DS3225 air-pinch servo endpoint/calibration
# testing on a breadboard (GPIO33 + GPIO5, mirrors the production air servo blocks).
# Not part of the tent install; safe to reflash/repurpose at will.
esphome:
  name: test-esp32
  friendly_name: Test ESP32

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret test_esp32_api_key

ota:
  - platform: esphome
    password: !secret test_esp32_ota_password

wifi:
  ssid: !secret wifi_ssid_grow
  password: !secret wifi_password_grow
  ap:
    ssid: "Test-ESP32"
    password: !secret test_esp32_ap_password

captive_portal:

# ---- Air-pinch servo bench test (mirrors tent-irrigation-controller.yaml) ----
# Signal-only on GPIO33 (feed) + GPIO5 (flush), 50Hz PWM via ledc, same as production.
# GPIO5 is a strapping pin - expect a brief harmless PWM blip at boot (same on the
# real controller). Servo POWER comes from the 6.0V buck rail, NOT the ESP32 5V pin;
# buck GND / servo GND / ESP32 GND tied on a common rail.
output:
   - platform: ledc
     pin: GPIO33
     frequency: 50 Hz
     id: feed_air_servo_pwm
   - platform: ledc
     pin: GPIO5
     frequency: 50 Hz
     id: flush_air_servo_pwm

# min_level/max_level widened from ESPHome defaults (3%/12% = 600-2400us) to
# 2.5%/12.5% = 500-2500us - DS3225 needs the full range to reach rated travel.
# CALIBRATION: use the position sliders below to find each servo's real mechanical
# endpoints, then transfer the numbers to the production config.
servo:
   - id: feed_air_servo
     output: feed_air_servo_pwm
     auto_detach_time: 1.5s
     transition_length: 0s
     min_level: 2.5%
     max_level: 12.5%
   - id: flush_air_servo
     output: flush_air_servo_pwm
     auto_detach_time: 1.5s
     transition_length: 0s
     min_level: 2.5%
     max_level: 12.5%

# ---- SCD41 CO2 / temp / humidity (I2C, added 2026-07-12) ----
# SCD41 is a native-3.3V I2C device -> wire DIRECTLY to the ESP32, NO level shifter.
# (The SN74AHCT125N you have is a UNIdirectional 5V buffer - wrong for bidirectional
# I2C - so it is NOT used here.) A SparkFun/GY-style breakout has onboard SDA/SCL
# pull-ups; a bare sensor needs 10k pull-ups to 3.3V on both lines.
#   SCD41 3.3V/VDD -> ESP32 3V3        SCD41 SDA -> GPIO21
#   SCD41 GND      -> common GND       SCD41 SCL -> GPIO22
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

sensor:
  - platform: scd4x
    address: 0x62
    update_interval: 15s
    co2:
      name: "Test CO2"
      id: test_co2
    temperature:
      name: "Test SCD41 Temperature"
    humidity:
      name: "Test SCD41 Humidity"

switch:
   - platform: template
     name: "Feed Air Test"
     id: feed_air_test
     icon: mdi:weather-windy
     optimistic: true
     turn_on_action:
       - servo.write:
           id: feed_air_servo
           level: -100%
     turn_off_action:
       - servo.write:
           id: feed_air_servo
           level: 100%
   - platform: template
     name: "Flush Air Test"
     id: flush_air_test
     icon: mdi:weather-windy
     optimistic: true
     turn_on_action:
       - servo.write:
           id: flush_air_servo
           level: -100%
     turn_off_action:
       - servo.write:
           id: flush_air_servo
           level: 100%

# Calibration sliders: creep to the exact mechanical endpoints (-100..100 = full
# pulse range 500-2500us). Detach buttons let the servo go limp so you can also
# move the horn by hand and feel where the stops are.
number:
   - platform: template
     name: "Feed Servo Position"
     id: feed_servo_position
     min_value: -100
     max_value: 100
     step: 1
     initial_value: 0
     optimistic: true
     mode: slider
     icon: mdi:rotate-right
     set_action:
       - servo.write:
           id: feed_air_servo
           level: !lambda 'return x / 100.0;'
   - platform: template
     name: "Flush Servo Position"
     id: flush_servo_position
     min_value: -100
     max_value: 100
     step: 1
     initial_value: 0
     optimistic: true
     mode: slider
     icon: mdi:rotate-right
     set_action:
       - servo.write:
           id: flush_air_servo
           level: !lambda 'return x / 100.0;'

button:
   - platform: template
     name: "Feed Servo Detach"
     icon: mdi:power-plug-off
     on_press:
       - servo.detach: feed_air_servo
   - platform: template
     name: "Flush Servo Detach"
     icon: mdi:power-plug-off
     on_press:
       - servo.detach: flush_air_servo
