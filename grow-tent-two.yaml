################ BME 280 #####################################  
i2c:
  sda: GPIO0
  scl: GPIO1
  scan: True
  id: i2c_bus

sensor:
  - platform: bme280_i2c
    id: bme280_canopy
    temperature:
      name: "Canopy Temperature"
      oversampling: 16x
      filters:
        - offset: 0.9
    pressure:
      name: "Canopy Pressure"
      filters:
        - offset: 3.1
    humidity:
      name: "Canopy Humidity"
      filters:
        - offset: 11.25    
    address: 0x76
    update_interval: 60s

  - platform: bme280_i2c
    id: bme280_flower
    temperature:
      name: "Flower Temperature"
      oversampling: 16x
      filters:
        - offset: 0.9
    pressure:
      name: "Flower Pressure"
      filters:
        - offset: 0.5
    humidity:
      name: "Flower Humidity"
      filters:
        - offset: -11.25    
    address: 0x77
    update_interval: 60s    



############ Plant Moisture ########################
  - platform: adc
    pin: GPIO4
    id: adc_sensor
    attenuation: 12db  # Assuming you want to apply attenuation here

  - platform: cd74hc4067
    id: raw_v1
    number: 0
    sensor: adc_sensor  # This is how you link the ADC sensor with the multiplexer channel
    name: "Plant 1 Volts"
    unit_of_measurement: "V"
    device_class: voltage
    update_interval: 10s
