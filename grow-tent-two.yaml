esphome:
  name: grow-tent-two
  friendly_name: Grow Tent Two

esp32:
  board: esp32-c3-devkitm-1

wifi:
  # Grow-area AP (GT784WN bridge @ 192.168.2.250, 2026-07-10) preferred;
  # main router kept as fallback - ESPHome falls back automatically if the AP is down.
  networks:
    - ssid: !secret wifi_ssid_grow
      password: !secret wifi_password_grow
      priority: 10
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      priority: 0
  ap:
    ssid: "Grow-Tent-Two Fallback Hotspot"
    password: !secret grow_tent_two_ap_password

captive_portal:

logger:
  level: VERY_VERBOSE

api:
  encryption:
    key: !secret grow_tent_two_api_key

ota:
  - platform: esphome
    password: !secret grow_tent_two_ota_password

cd74hc4067:
  id: cd74hc4067_1
  pin_s0: GPIO18
  pin_s1: GPIO19
  pin_s2: GPIO20
  pin_s3: GPIO21

# NOTE 2026-07-13: the two BME280 climate sensors (Canopy 0x76 / Flower 0x77) and their i2c bus
# (SDA GPIO0 / SCL GPIO1) were REMOVED - relocated to the dedicated grow-tent-env board (SCD41 + 4x
# BME280). GPIO0/1 now free. Moisture mux + plant/flood sensors below are untouched.

sensor:
  # WiFi diagnostics (grow-area AP migration 2026-07-10)
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

############ Plant Moisture ########################
  - platform: adc
    pin: GPIO4
    id: adc_sensor
    attenuation: 12db  # Assuming you want to apply attenuation here

  - platform: cd74hc4067
