  - platform: template
    name: "Plant 1 Moisture"
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement
    lambda: |-
      float voltage = id(raw_v1).state;
      // Apply linear calibration within the lambda function itself.
      float moisture = (2.15 - voltage) / (2.15 - 0.95) * 100.0;
      // Clamp the moisture value between 0 and 100.
      if (moisture < 0) return 0;
      else if (moisture > 100) return 100;
      else return moisture;
    filters:
      - sliding_window_moving_average:
          window_size: 12
          send_every: 12
          send_first_at: 1
    accuracy_decimals: 2
