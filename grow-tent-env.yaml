# Grow-tent environment board (ESP32-WROOM-32D): SCD41 CO2 + 4x BME280.
# Fresh board, first-flashed 2026-07-12. Tent air-quality suite.
# 2026-07-13: swapped the 3 mislabeled BMP280s out for 4 genuine BME280s (chip 0x60,
# temp + pressure + humidity). BME280 has only two addresses (0x76/0x77), so 4 of them
# need BOTH I2C buses = two per bus, one strapped SDO->GND (0x76) and one SDO->3.3V (0x77).
esphome:
  name: grow-tent-env
  friendly_name: Grow Tent Environment

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret grow_tent_env_api_key

ota:
  - platform: esphome
    password: !secret grow_tent_env_ota_password

wifi:
  ssid: !secret wifi_ssid_grow
  password: !secret wifi_password_grow
  ap:
    ssid: "Grow-Tent-Env Fallback"
    password: !secret grow_tent_env_ap_password

captive_portal:

# ---- Two I2C buses ----
# BME280 = only two addresses (0x76/0x77), so four of them can't share one bus.
# The WROOM-32D has two hardware I2C buses:
#   Bus A (GPIO21/22): SCD41 0x62 + BME280 Lights 0x76 + BME280 Controller 0x77
#   Bus B (GPIO16/17): BME280 Top Canopy 0x76 + BME280 Mid Canopy 0x77
# Each bus: one module SDO->GND (0x76), one SDO->3.3V (0x77). Strap SDO SOLIDLY - a
# floating/loose SDO leaves the module at an undefined address and it won't answer.
# Breakouts have onboard SDA/SCL pull-ups; keep each bus run SHORT (I2C hates long cable).
i2c:
  - id: bus_a
    sda: GPIO21
    scl: GPIO22
    scan: true
  - id: bus_b
    sda: GPIO16
    scl: GPIO17
    scan: true

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  # ---- SCD41 CO2 / temp / humidity (bus A, 0x62) ----
  - platform: scd4x
    i2c_id: bus_a
    address: 0x62
    update_interval: 30s
    co2:
      name: "CO2"
      id: tent_co2
    temperature:
      name: "CO2 Temperature"
    humidity:
      name: "CO2 Humidity"

  # ---- BME280 Lights (bus A, 0x76 -> SDO to GND) ----
  # NOTE: no per-unit offsets yet - RE-CALIBRATE on the bench. One unit reads high; add an
  # `offset:` under temperature/humidity here once we know which slot it lands in.
  - platform: bme280_i2c
    i2c_id: bus_a
    address: 0x76
    update_interval: 30s
    temperature:
      name: "Lights Temperature"
      oversampling: 16x
    pressure:
      name: "Lights Pressure"
    humidity:
      name: "Lights Humidity"

  # ---- BME280 Controller (bus A, 0x77 -> SDO to 3.3V) ----
  - platform: bme280_i2c
    i2c_id: bus_a
    address: 0x77
    update_interval: 30s
    temperature:
      name: "Controller Temperature"
      oversampling: 16x
    pressure:
      name: "Controller Pressure"
    humidity:
      name: "Controller Humidity"

  # ---- BME280 Top Canopy (bus B, 0x76 -> SDO to GND) ----
  - platform: bme280_i2c
    i2c_id: bus_b
    address: 0x76
    update_interval: 30s
    temperature:
      name: "Top Canopy Temperature"
      oversampling: 16x
    pressure:
      name: "Top Canopy Pressure"
    humidity:
      name: "Top Canopy Humidity"

  # ---- BME280 Mid Canopy (bus B, 0x77 -> SDO to 3.3V) ----
  - platform: bme280_i2c
    i2c_id: bus_b
    address: 0x77
    update_interval: 30s
    temperature:
      name: "Mid Canopy Temperature"
      oversampling: 16x
    pressure:
      name: "Mid Canopy Pressure"
    humidity:
      name: "Mid Canopy Humidity"

text_sensor:
  - platform: wifi_info
    ssid:
      name: "WiFi SSID"
