esphome:
  name: grow-tent-one
  friendly_name: grow-tent-one

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret grow_tent_one_api_key

ota:
  - platform: esphome
    password: !secret grow_tent_one_ota_password

wifi:
  # Grow-area AP (GT784WN bridge @ 192.168.2.250, 2026-07-10) preferred;
  # main router kept as fallback - ESPHome falls back automatically if the AP is down.
  networks:
    - ssid: !secret wifi_ssid_grow
      password: !secret wifi_password_grow
      priority: 10
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      priority: 0
  ap:
    ssid: "Grow-Tent-One Fallback Hotspot"
    password: !secret grow_tent_one_ap_password

captive_portal:

################ Dallas 1-Wire (DS18B20 reservoir temp) ################
one_wire:
  - platform: gpio
    pin: GPIO0

################ Humidifier Fan PWM (Noctua NF-F12 iPPC 3000) ################
output:
  - platform: ledc
    pin: GPIO1
    id: humidifier_fan_pwm_output
    frequency: 25000Hz
    max_power: 0.99

fan:
  - platform: speed
    output: humidifier_fan_pwm_output
    name: "Humidifier Fan PWM"
    id: humidifier_fan_pwm

################ Sensors ################
sensor:
  # WiFi diagnostics (grow-area AP migration 2026-07-10)
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  # NOTE 2026-07-13: analog MG-811 CO2 sensor (GPIO3 ADC + Raw ADC / Corrected CO2 Voltage /
  # CO2 Concentration lambda) REMOVED - retired in favour of the SCD41 on grow-tent-env. GPIO3 now free.

  # Humidifier fan tach / RPM (Noctua green wire, 2 pulses per revolution)
  - platform: pulse_counter
    pin:
      number: GPIO18
      mode:
        input: true
        pullup: true
    name: "Humidifier Fan RPM"
    id: humidifier_fan_rpm
    update_interval: 5s
    count_mode:
      rising_edge: INCREMENT
      falling_edge: DISABLE
    use_pcnt: false
    internal_filter: 100us
    unit_of_measurement: "RPM"
    accuracy_decimals: 0
    filters:
      - multiply: 0.288

  # DS18B20 reservoir temperature
  # NOTE: Address TBD  flash once, check logs for scanned address, then add here
  - platform: dallas_temp
    name: "Humidifier Reservoir Temperature"
    id: humidifier_reservoir_temp
    update_interval: 30s

################ Switches ################
switch:
  - platform: gpio
    name: "Table Drain Pump"
    pin: GPIO10
    id: table_drain_pump_irrigation_tent
    on_turn_on:
      - lambda: |-
          id(manual_table_drain_pump_irrigation_tent_switch_override) = true;
    on_turn_off:
      - lambda: |-
          id(manual_table_drain_pump_irrigation_tent_switch_override) = true;

  - platform: gpio
    name: "Extra Relay"
    pin:
      number: GPIO5
      inverted: false
    id: extra_relay

################ Globals ################
globals:
  - id: manual_table_drain_pump_irrigation_tent_switch_override
    type: bool
    restore_value: no
    initial_value: 'false'

################ Binary Sensors ################
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO6
      mode: INPUT_PULLUP
      inverted: true
    name: "Table Drain Empty"
    id: table_drain_empty_irrigation_tent
    device_class: moisture
    filters:
      - delayed_on: 5s
      - delayed_off: 5s

  - platform: gpio
    pin:
      number: GPIO7
      mode: INPUT_PULLUP
      inverted: true
    name: "Table Drain Full"
    id: table_drain_full_irrigation_tent
    device_class: moisture
    filters:
      - delayed_on: 5s
      - delayed_off: 5s

################ WiFi info (grow-area AP migration 2026-07-10) ################
text_sensor:
  - platform: wifi_info
    ssid:
      name: "WiFi SSID"
